<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --sidebar-width: 220px; }
        body { background: #f8f9fa; font-family: "Microsoft YaHei","微软雅黑",sans-serif; }
        .sidebar { width: var(--sidebar-width); min-height: 100vh; background: #1a1f2e; position: fixed; left:0; top:0; padding-top: 20px; z-index: 100; }
        .sidebar-brand { color: #fff; font-size: 1.1rem; font-weight: bold; padding: 0 20px 20px; border-bottom: 1px solid #2d3548; }
        .sidebar-brand small { font-size: 0.75rem; color: #8b9bb4; font-weight: normal; }
        .nav-link { color: #a0aec0; padding: 12px 20px; border-radius: 0; transition: all .2s; }
        .nav-link:hover, .nav-link.active { color: #fff; background: #2d3548; }
        .nav-link i { width: 24px; text-align: center; margin-right: 8px; }
        .main-content { margin-left: var(--sidebar-width); padding: 24px; }
        .card { border: none; box-shadow: 0 1px 3px rgba(0,0,0,.08); border-radius: 8px; }
        .card-header { background: #fff; border-bottom: 1px solid #e9ecef; font-weight: 600; padding: 14px 20px; }
        .table th { background: #f1f5f9; font-weight: 600; font-size: 0.85rem; color: #475569; border-bottom: 2px solid #e2e8f0; }
        .table td { font-size: 0.88rem; vertical-align: middle; }
        .badge-status { padding: 5px 10px; border-radius: 4px; font-size: 0.78rem; font-weight: 500; }
        .badge-待认领 { background: #FFF3E0; color: #E65100; }
        .badge-已认领 { background: #E3F2FD; color: #1565C0; }
        .badge-已验收 { background: #E8F5E9; color: #2E7D32; }
        .badge-已上架 { background: #E0F7FA; color: #00838F; }
        .badge-已入库 { background: #ECEFF1; color: #546E7A; }
        .stat-card { background: #fff; border-radius: 8px; padding: 16px 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        .stat-card .label { font-size: 0.82rem; color: #64748b; }
        .stat-card .value { font-size: 1.6rem; font-weight: 700; margin-top: 4px; }
        .stat-物资 { color: #4f46e5; }
        .stat-待认领 { color: #ea580c; }
        .stat-已认领 { color: #0284c7; }
        .stat-已验收 { color: #16a34a; }
        .stat-已上架 { color: #0891b2; }
        .stat-已入库 { color: #6b7280; }
        .btn-sm { padding: 4px 10px; font-size: 0.82rem; }
        .form-control, .form-select { font-size: 0.88rem; }
        .modal-title { font-size: 1rem; font-weight: 600; }
        .toast-container { z-index: 1060; }
        tr.status-待认领 { background: #FFF8E1 !important; }
        tr.status-已认领 { background: #E3F2FD !important; }
        tr.status-已验收 { background: #E8F5E9 !important; }
        tr.status-已上架 { background: #E0F7FA !important; }
        tr.status-已入库 { background: #ECEFF1 !important; }
        .page-header { margin-bottom: 20px; }
        .page-header h4 { margin: 0; font-weight: 700; }
        .search-bar { background: #fff; padding: 16px 20px; border-radius: 8px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        .table-responsive { background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        .dropdown-menu { font-size: 0.85rem; }
        .topbar { background: #fff; padding: 12px 24px; margin: -24px -24px 20px; border-bottom: 1px solid #e9ecef; display: flex; justify-content: flex-end; align-items: center; gap: 12px; }
        .user-info { display: flex; align-items: center; gap: 8px; font-size: 0.88rem; color: #475569; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 600; }
        .sidebar-footer { position: absolute; bottom: 0; left: 0; right: 0; padding: 14px 20px; border-top: 1px solid #2d3548; }
        .sidebar-footer a { color: #8b9bb4; font-size: 0.82rem; text-decoration: none; display: flex; align-items: center; gap: 8px; transition: color .2s; }
        .sidebar-footer a:hover { color: #fff; }
    </style>
</head>
<body>

<nav class="sidebar" th:fragment="sidebar">
    <div class="sidebar-brand">
        <i class="bi bi-box-seam"></i> 物资管理系统
        <br>
        <small>到货·认领·验收·上架·入库</small>
    </div>
    <ul class="nav flex-column mt-3">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${active == 'home'} ? 'active' : ''" href="/">
                <i class="bi bi-speedometer2"></i> 首页概览
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${active == 'materials'} ? 'active' : ''" href="/materials">
                <i class="bi bi-box"></i> 物资基础信息
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${active == 'arrivals'} ? 'active' : ''" href="/arrivals">
                <i class="bi bi-truck"></i> 到货登记
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${active == 'warehousing'} ? 'active' : ''" href="/warehousing">
                <i class="bi bi-clipboard-check"></i> 入库管理
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${active == 'export'} ? 'active' : ''" href="/export">
                <i class="bi bi-file-earmark-excel"></i> 进度导出
            </a>
        </li>
    </ul>
    <div class="sidebar-footer">
        <a href="/logout">
            <i class="bi bi-box-arrow-left"></i> 退出登录
        </a>
    </div>
</nav>

<div class="topbar" th:fragment="topbar">
    <div class="user-info">
        <div class="user-avatar"><i class="bi bi-person"></i></div>
        <span>欢迎，<strong th:text="${#httpServletRequest.remoteUser}">用户</strong></span>
        <a href="/logout" class="btn btn-outline-secondary btn-sm"><i class="bi bi-box-arrow-right"></i> 退出</a>
    </div>
</div>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</div>

</body>
</html>
